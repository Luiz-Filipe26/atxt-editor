<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ATXT Studio</title>
        <link rel="stylesheet" href="main.css" />
    </head>
    <body>
        <div class="workspace">
            <div id="editor-pane" class="pane">
                <div class="header">
                    <span class="header-title">ATXT</span>
                    <div class="file-controls">
                        <select id="file-select" title="Arquivo atual"></select>
                        <button id="btn-new-file" class="btn-icon" title="Novo arquivo">+</button>
                        <button id="btn-rename-file" class="btn-icon" title="Renomear">✎</button>
                        <button
                            id="btn-delete-file"
                            class="btn-icon btn-danger"
                            title="Deletar arquivo"
                        >
                            🗑
                        </button>
                    </div>
                </div>
                <textarea
                    id="input"
                    spellcheck="false"
                    placeholder="Escreva seu documento aqui..."
                ></textarea>
            </div>

            <div id="preview-pane" class="pane">
                <div class="header">
                    <span class="header-title">Preview</span>
                    <div class="preview-actions">
                        <button id="btn-zoom-out" class="btn-icon">-</button>
                        <span
                            id="zoom-level"
                            style="
                                font-size: 11px;
                                align-self: center;
                                min-width: 35px;
                                text-align: center;
                            "
                            >100%</span
                        >
                        <button id="btn-zoom-in" class="btn-icon">+</button>
                        <button id="btn-export-raw" class="btn-action">↓ .atxt</button>
                        <button id="btn-serialize" class="btn-action">↓ Canônico</button>
                    </div>
                </div>
                <atxt-document></atxt-document>
            </div>
        </div>

        <div id="error-panel" class="collapsed">
            <div id="error-panel-header">
                <span class="error-panel-title">Erros do compilador</span>
                <span id="error-badge" class="no-errors">0</span>
                <span id="error-toggle-icon">▼</span>
            </div>
            <div id="error-list"></div>
        </div>

        <script type="module" src="./main.ts"></script>
    </body>
</html>
